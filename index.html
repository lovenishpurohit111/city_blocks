<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>City Bloxx</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#111;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  touch-action:none;
}
canvas {
  display:block;
  max-width:100vw;
  max-height:100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ════════════════════════════════════════════════
//  CITY BLOXX — faithful recreation
// ════════════════════════════════════════════════
const C = document.getElementById('c');
const cx = C.getContext('2d');
const W = 360, H = 600;
C.width = W; C.height = H;

function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  C.style.width  = (W*s)+'px';
  C.style.height = (H*s)+'px';
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ────────────────────────────────────────
let AC;
function initAC(){ if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)(); }
function tone(f,d,t='square',v=0.15){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  o.start(); o.stop(AC.currentTime+d+0.05);
}
function sndPlace(){ tone(280,0.07,'square',0.2); setTimeout(()=>tone(420,0.05,'square',0.12),60); }
function sndPerfect(){ [500,660,880].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'square',0.2),i*70)); }
function sndMiss(){ tone(150,0.3,'sawtooth',0.18); setTimeout(()=>tone(100,0.4,'sawtooth',0.13),160); }
function sndGO(){ [300,240,180,140,100].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sawtooth',0.15),i*100)); }

// ── BUILDING TYPES ───────────────────────────────
// Each "building" is one floor unit dropped from crane
const BW = 100;  // base building width
const BH = 50;   // building height

const SKINS = [
  // orange/tan - classic nokia building
  { body:'#E8941A', top:'#F5C040', shadow:'#A86010', win:'#87CEEB', winlit:'#FFEE88', roof:'#C87010' },
  // blue glass tower
  { body:'#2266BB', top:'#3388EE', shadow:'#113377', win:'#AADDFF', winlit:'#EEFFAA', roof:'#1144AA' },
  // red brick
  { body:'#AA3322', top:'#CC4433', shadow:'#771111', win:'#FFCCAA', winlit:'#FFEE88', roof:'#882211' },
  // green
  { body:'#228844', top:'#33AA55', shadow:'#115522', win:'#AAFFCC', winlit:'#EEFFAA', roof:'#116633' },
  // purple
  { body:'#663399', top:'#8844BB', shadow:'#441177', win:'#DDAAFF', winlit:'#FFEEBB', roof:'#552288' },
];

// ── GAME STATE ───────────────────────────────────
let state = 'menu';
let tower = [];        // landed buildings [{x,y,w,skin}]
let pendX = W/2;       // pendulum X position
let pendDir = 1;       // 1 = right, -1 = left
let pendSpeed = 3.0;
let cameraY = 0;       // world scroll offset
let score = 0;
let hi = Number(localStorage.getItem('cb2_hi')||0);
let combo = 0;
let particles = [];
let flash = {t:0, msg:'', col:'#fff'};
let shakeT = 0;
let frame = 0;
let levelColors = 0;

// sky / bg
const SKY_TOP_DAY   = [100, 160, 230];
const SKY_BOT_DAY   = [160, 210, 240];
const SKY_TOP_NIGHT = [  5,  10,  30];
const SKY_BOT_NIGHT = [ 10,  20,  50];

// ── CRANE ────────────────────────────────────────
const CRANE_Y = 60;    // crane rail Y (screen, fixed)
const ROPE_LEN = 90;

// ── HELPERS ──────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpC(a,b,t){
  return [
    Math.round(lerp(a[0],b[0],t)),
    Math.round(lerp(a[1],b[1],t)),
    Math.round(lerp(a[2],b[2],t))
  ];
}
function rgb(c){ return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rnd(a,b){ return a+Math.random()*(b-a); }

// ── INIT GAME ────────────────────────────────────
function startGame(){
  tower = [];
  score = 0; combo = 0; cameraY = 0; frame = 0; levelColors = 0;
  particles = []; flash.t = 0; shakeT = 0;
  pendX = W/2; pendDir = 1; pendSpeed = 3.0;
  // foundation slab
  const groundY = H - 80; // world Y of ground surface
  tower.push({ x: W/2 - BW/2, y: groundY - BH, w: BW, skin: 0 });
  state = 'playing';
}

// ── LANDING ──────────────────────────────────────
function dropBuilding(){
  if(state !== 'playing') return;
  initAC();

  const top = tower[tower.length-1];
  const dropW = getCurrentBW();
  const dropX = pendX - dropW/2;
  const dropY = top.y - BH;

  // overlap
  const left  = Math.max(dropX, top.x);
  const right = Math.min(dropX + dropW, top.x + top.w);
  const overlap = right - left;

  if(overlap <= 4){
    // complete miss
    sndMiss();
    spawnMissParticles(pendX, worldToScreen(dropY));
    shakeT = 30;
    setTimeout(()=>{ state='gameover'; sndGO(); }, 400);
    return;
  }

  // trim to overlap
  const newX = left;
  const newW = overlap;
  const pct = overlap / Math.min(dropW, top.w);

  const skin = levelColors % SKINS.length;
  tower.push({ x: newX, y: dropY, w: newW, skin });

  // scoring
  let pts = 10;
  if(pct > 0.96){
    combo++;
    pts = 20 + combo * 10;
    sndPerfect();
    flash.msg = combo >= 3 ? `PERFECT x${combo}` : 'PERFECT!';
    flash.col = '#FFD700'; flash.t = 80;
    spawnPerfectParticles(W/2, worldToScreen(dropY));
  } else {
    combo = 0;
    pts = Math.round(10 * pct);
    sndPlace();
    spawnDustParticles(newX + newW/2, worldToScreen(dropY));
  }

  score += pts;
  if(score > hi){ hi = score; localStorage.setItem('cb2_hi', hi); }
  levelColors++;

  // scroll camera up as tower grows
  const screenTop = worldToScreen(dropY);
  if(screenTop < H * 0.45){
    cameraY += H * 0.45 - screenTop;
  }

  // speed up slightly
  pendSpeed = 3.0 + Math.min(tower.length * 0.12, 4.5);
  levelColors = tower.length;
}

function getCurrentBW(){
  // block gets slightly narrower as tower grows, min 30
  return Math.max(30, BW - Math.floor(tower.length * 1.2));
}

function worldToScreen(wy){ return wy - cameraY; }

// ── PARTICLES ────────────────────────────────────
function spawnDustParticles(x, y){
  for(let i=0;i<10;i++){
    const a = -Math.PI + Math.random()*Math.PI;
    const s = rnd(1,4);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:35,max:35,r:rnd(2,5),col:'#C8A060'});
  }
}
function spawnPerfectParticles(x, y){
  const cols=['#FFD700','#FFF','#FFB','#FFA020','#FFFFFF'];
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2, s=rnd(2,6);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:50,max:50,r:rnd(2,6),col:cols[i%cols.length]});
  }
}
function spawnMissParticles(x, y){
  const s=SKINS[(tower.length)%SKINS.length];
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, sp=rnd(2,7);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:55,max:55,r:rnd(3,7),col:s.body});
  }
}

// ══════════════════════════════════════════════
//  DRAWING
// ══════════════════════════════════════════════

function drawSky(){
  const nightT = Math.min(1, score/400);
  const topC = lerpC(SKY_TOP_DAY, SKY_TOP_NIGHT, nightT);
  const botC = lerpC(SKY_BOT_DAY, SKY_BOT_NIGHT, nightT);
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, rgb(topC));
  g.addColorStop(1, rgb(botC));
  cx.fillStyle = g;
  cx.fillRect(0,0,W,H);

  // stars at night
  if(nightT > 0.2){
    const sa = Math.min(1,(nightT-0.2)/0.4);
    cx.fillStyle = `rgba(255,255,255,${sa*0.8})`;
    for(let i=0;i<60;i++){
      const sx = ((i*137+frame*0.1)%W);
      const sy = ((i*97)%( H*0.55));
      const tw = 0.4+0.6*Math.abs(Math.sin(i+frame*0.025));
      cx.globalAlpha = sa*tw;
      cx.fillRect(sx,sy,1.5,1.5);
    }
    cx.globalAlpha=1;
  }
}

function drawCityBg(){
  // silhouette buildings behind
  const nightT = Math.min(1, score/400);
  const alpha = lerp(0.18, 0.55, nightT);
  cx.fillStyle = nightT < 0.5
    ? `rgba(80,110,160,${alpha})`
    : `rgba(8,15,40,${alpha+0.2})`;

  const bgs = [
    {x:10, w:30, h:120},{x:38, w:22, h:90},{x:55, w:35, h:160},
    {x:85, w:18, h:100},{x:98, w:40, h:200},{x:130, w:25, h:130},
    {x:148, w:15, h:80},{x:160, w:45, h:180},{x:195, w:20, h:140},
    {x:210, w:30, h:110},{x:235, w:22, h:160},{x:252, w:40, h:220},
    {x:285, w:18, h:95},{x:298, w:35, h:150},{x:326, w:25, h:190},
    {x:344, w:20, h:120},
  ];

  const groundScreen = worldToScreen(H - 80);
  bgs.forEach(b=>{
    const bTop = groundScreen - b.h;
    cx.fillRect(b.x, bTop, b.w, b.h);
    // windows at night
    if(nightT > 0.3){
      for(let wy=bTop+8; wy<groundScreen-8; wy+=14){
        for(let wx=b.x+4; wx<b.x+b.w-6; wx+=9){
          if(Math.sin(wx*5+wy*3+b.h)>0.2){
            cx.fillStyle=`rgba(255,220,80,${(nightT-0.3)*0.7})`;
            cx.fillRect(wx,wy,4,6);
            cx.fillStyle=nightT<0.5?`rgba(80,110,160,${alpha})`:`rgba(8,15,40,${alpha+0.2})`;
          }
        }
      }
    }
  });
}

function drawGround(){
  const gy = worldToScreen(H - 80);
  // road
  cx.fillStyle='#3a3a3a';
  cx.fillRect(0, gy, W, H-gy);
  // sidewalk line
  cx.fillStyle='#555';
  cx.fillRect(0, gy, W, 3);
  // road markings
  cx.fillStyle='#888';
  for(let i=0;i<W;i+=40){
    cx.fillRect(i, gy+12, 24, 4);
  }
}

function drawBuilding(b, isTop=false){
  const sk = SKINS[b.skin % SKINS.length];
  const sy = worldToScreen(b.y);
  const x=b.x, y=sy, w=b.w, h=BH;
  const iso = Math.min(10, w*0.1);

  // drop shadow
  cx.fillStyle='rgba(0,0,0,0.22)';
  cx.fillRect(x+iso+2, y+h, w, 6);

  // right face (shadow)
  cx.fillStyle = sk.shadow;
  cx.beginPath();
  cx.moveTo(x+w, y);
  cx.lineTo(x+w+iso, y-iso);
  cx.lineTo(x+w+iso, y+h-iso);
  cx.lineTo(x+w, y+h);
  cx.closePath(); cx.fill();

  // top face
  cx.fillStyle = sk.top;
  cx.beginPath();
  cx.moveTo(x, y);
  cx.lineTo(x+iso, y-iso);
  cx.lineTo(x+w+iso, y-iso);
  cx.lineTo(x+w, y);
  cx.closePath(); cx.fill();

  // front face
  cx.fillStyle = sk.body;
  cx.fillRect(x, y, w, h);

  // gradient sheen on front
  const g = cx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'rgba(255,255,255,0.15)');
  g.addColorStop(0.5,'rgba(255,255,255,0.0)');
  g.addColorStop(1,'rgba(0,0,0,0.2)');
  cx.fillStyle=g; cx.fillRect(x,y,w,h);

  // windows
  const cols = Math.max(1,Math.floor(w/22));
  const rows = Math.max(1,Math.floor(h/20));
  const ww = Math.max(4,(w-8)/cols-3);
  const wh = Math.max(4,(h-8)/rows-3);
  const nightT = Math.min(1,score/400);

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const wx = x+5+c*((w-6)/cols);
      const wy = y+5+r*((h-6)/rows);
      const lit = nightT>0.25 && Math.sin(b.skin*9+r*7+c*13)>0;
      cx.fillStyle = lit ? sk.winlit : sk.win;
      cx.globalAlpha = lit ? 0.95 : 0.6;
      cx.fillRect(wx,wy,ww,wh);
    }
  }
  cx.globalAlpha=1;

  // outline
  cx.strokeStyle='rgba(0,0,0,0.3)';
  cx.lineWidth=1;
  cx.strokeRect(x,y,w,h);

  // highlight top edge for topmost block
  if(isTop){
    cx.strokeStyle='rgba(255,255,255,0.5)';
    cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(x,y); cx.lineTo(x+w,y); cx.stroke();
  }
}

function drawCrane(){
  const topBlock = tower[tower.length-1];
  const landY = worldToScreen(topBlock.y) - BH;  // where next block will land
  const bw = getCurrentBW();

  // crane tower (vertical mast on left)
  cx.fillStyle='#666';
  cx.fillRect(20, 0, 12, CRANE_Y+5);
  // diagonal brace
  cx.strokeStyle='#555'; cx.lineWidth=4;
  cx.beginPath(); cx.moveTo(20,0); cx.lineTo(32,CRANE_Y); cx.stroke();

  // horizontal arm
  cx.fillStyle='#777';
  cx.fillRect(20, CRANE_Y-6, W-20, 12);

  // counter weight
  cx.fillStyle='#555';
  cx.fillRect(22, CRANE_Y-16, 28, 16);

  // trolley (moves with pendulum)
  cx.fillStyle='#555';
  cx.fillRect(pendX-14, CRANE_Y-8, 28, 14);
  // trolley wheels
  cx.fillStyle='#333';
  [pendX-8, pendX+8].forEach(wx=>{
    cx.beginPath(); cx.arc(wx,CRANE_Y+4,4,0,Math.PI*2); cx.fill();
  });

  // rope
  cx.strokeStyle='#aaa'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(pendX, CRANE_Y+6); cx.lineTo(pendX, CRANE_Y+ROPE_LEN); cx.stroke();

  // hanging building
  const hbx = pendX - bw/2;
  const hby = CRANE_Y + ROPE_LEN;
  const sk = SKINS[levelColors % SKINS.length];

  // shadow
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.fillRect(hbx+8,hby+BH,bw,5);

  // right face
  const iso=Math.min(10,bw*0.1);
  cx.fillStyle=sk.shadow;
  cx.beginPath();
  cx.moveTo(hbx+bw,hby);
  cx.lineTo(hbx+bw+iso,hby-iso);
  cx.lineTo(hbx+bw+iso,hby+BH-iso);
  cx.lineTo(hbx+bw,hby+BH);
  cx.closePath(); cx.fill();

  // top face
  cx.fillStyle=sk.top;
  cx.beginPath();
  cx.moveTo(hbx,hby);
  cx.lineTo(hbx+iso,hby-iso);
  cx.lineTo(hbx+bw+iso,hby-iso);
  cx.lineTo(hbx+bw,hby);
  cx.closePath(); cx.fill();

  // front
  cx.fillStyle=sk.body;
  cx.fillRect(hbx,hby,bw,BH);

  // windows on hanging block
  const wc=Math.max(1,Math.floor(bw/22));
  for(let c=0;c<wc;c++){
    cx.fillStyle=sk.win;
    cx.globalAlpha=0.6;
    cx.fillRect(hbx+5+c*((bw-6)/wc), hby+8, Math.max(4,(bw-8)/wc-3), 14);
  }
  cx.globalAlpha=1;
  cx.strokeStyle='rgba(0,0,0,0.3)'; cx.lineWidth=1;
  cx.strokeRect(hbx,hby,bw,BH);

  // landing guide line (dashed)
  cx.save();
  cx.setLineDash([6,6]);
  cx.strokeStyle='rgba(255,255,255,0.25)';
  cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(0,landY); cx.lineTo(W,landY); cx.stroke();
  cx.setLineDash([]);
  cx.restore();

  // alignment guide: show overlap area
  const tx = topBlock.x, tw = topBlock.w;
  const bLeft = hbx, bRight = hbx+bw;
  const oLeft = Math.max(bLeft,tx), oRight = Math.min(bRight,tx+tw);
  if(oRight>oLeft){
    cx.fillStyle='rgba(255,255,100,0.15)';
    cx.fillRect(oLeft, landY, oRight-oLeft, BH);
  }
}

function drawHUD(){
  // score box
  cx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(cx,8,8,110,58,8); cx.fill();
  cx.fillStyle='#FFD700'; cx.font='bold 9px monospace'; cx.fillText('SCORE',16,23);
  cx.fillStyle='#fff'; cx.font='bold 28px monospace'; cx.fillText(score,16,52);

  // best
  cx.fillStyle='rgba(0,0,0,0.45)';
  roundRect(cx,W/2-50,8,100,24,6); cx.fill();
  cx.fillStyle='#bbb'; cx.font='10px monospace'; cx.textAlign='center';
  cx.fillText('BEST '+hi, W/2, 23); cx.textAlign='left';

  // level / combo
  const lvl = 1+Math.floor(score/80);
  cx.fillStyle='rgba(0,0,0,0.45)';
  roundRect(cx,W-78,8,70,38,8); cx.fill();
  cx.fillStyle='#88FFAA'; cx.font='bold 8px monospace'; cx.fillText('LEVEL',W-70,22);
  cx.fillStyle='#fff'; cx.font='bold 18px monospace'; cx.fillText(lvl,W-70,40);

  if(combo>=2){
    cx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(cx,8,72,90,24,6); cx.fill();
    cx.fillStyle='#FFAA44'; cx.font='bold 12px monospace';
    cx.fillText('⚡ x'+combo, 16, 88);
  }

  // flash message
  if(flash.t>0){
    const a=Math.min(1,flash.t/20);
    cx.save(); cx.globalAlpha=a;
    cx.translate(W/2, H*0.35);
    cx.fillStyle='rgba(0,0,0,0.6)';
    cx.font='bold 20px monospace';
    const tw=cx.measureText(flash.msg).width;
    roundRect(cx,-tw/2-12,-26,tw+24,36,8); cx.fill();
    cx.fillStyle=flash.col; cx.textAlign='center';
    cx.fillText(flash.msg,0,0);
    cx.textAlign='left'; cx.restore();
    flash.t--;
  }

  // tap hint
  if(score===0 && state==='playing'){
    cx.fillStyle='rgba(255,255,255,0.7)';
    cx.font='bold 13px monospace'; cx.textAlign='center';
    cx.fillText('TAP or SPACE to drop!', W/2, H-22);
    cx.textAlign='left';
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawParticles(){
  particles.forEach(p=>{
    cx.globalAlpha=(p.life/p.max)*0.9;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;
}

// ── MENU ──────────────────────────────────────────
function drawMenu(){
  // sky
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a3a7a'); g.addColorStop(1,'#2a5aaa');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);

  // animated demo tower
  const t=Date.now()/1000;
  for(let i=0;i<6;i++){
    const sk=SKINS[i%SKINS.length];
    const bw=BW-i*5;
    const bx=W/2-bw/2+Math.sin(t*0.8+i*0.4)*3;
    const by=H-80-BH*(i+1);
    const iso=Math.min(10,bw*0.1);

    cx.fillStyle=sk.shadow;
    cx.beginPath(); cx.moveTo(bx+bw,by); cx.lineTo(bx+bw+iso,by-iso);
    cx.lineTo(bx+bw+iso,by+BH-iso); cx.lineTo(bx+bw,by+BH); cx.closePath(); cx.fill();
    cx.fillStyle=sk.top;
    cx.beginPath(); cx.moveTo(bx,by); cx.lineTo(bx+iso,by-iso);
    cx.lineTo(bx+bw+iso,by-iso); cx.lineTo(bx+bw,by); cx.closePath(); cx.fill();
    cx.fillStyle=sk.body; cx.fillRect(bx,by,bw,BH);
    cx.strokeStyle='rgba(0,0,0,0.3)'; cx.lineWidth=1; cx.strokeRect(bx,by,bw,BH);
  }

  // ground
  cx.fillStyle='#2a2010'; cx.fillRect(0,H-80,W,80);
  cx.fillStyle='#444'; cx.fillRect(0,H-80,W,3);

  // title panel
  cx.fillStyle='rgba(0,0,0,0.75)';
  roundRect(cx,W/2-120,40,240,100,14); cx.fill();
  cx.strokeStyle='#E8941A'; cx.lineWidth=3;
  roundRect(cx,W/2-120,40,240,100,14); cx.stroke();

  cx.fillStyle='#E8941A'; cx.font='bold 44px monospace'; cx.textAlign='center';
  cx.fillText('CITY',W/2,95);
  cx.fillStyle='#F5C040'; cx.font='bold 26px monospace';
  cx.fillText('B  L  O  X  X',W/2,128);

  if(hi>0){
    cx.fillStyle='#aaa'; cx.font='11px monospace';
    cx.fillText('BEST: '+hi, W/2, 148);
  }

  // play button
  const p=0.96+0.04*Math.sin(t*3);
  cx.save(); cx.translate(W/2,H*0.62); cx.scale(p,p);
  cx.fillStyle='#E8941A';
  roundRect(cx,-90,-26,180,52,10); cx.fill();
  cx.strokeStyle='#FFD700'; cx.lineWidth=2;
  roundRect(cx,-90,-26,180,52,10); cx.stroke();
  cx.fillStyle='#000'; cx.font='bold 22px monospace';
  cx.fillText('▶  PLAY',0,9);
  cx.restore();

  // instructions
  cx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(cx,W/2-115,H*0.73,230,72,10); cx.fill();
  cx.fillStyle='#ccc'; cx.font='11px monospace';
  ['Drop buildings on the tower','PERFECT = big bonus points','Tap · Click · Space to drop'].forEach((l,i)=>{
    cx.fillText(l,W/2,H*0.73+20+i*20);
  });
  cx.textAlign='left';
}

// ── GAME OVER ─────────────────────────────────────
function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,0.7)'; cx.fillRect(0,0,W,H);

  cx.fillStyle='rgba(12,5,2,0.97)';
  roundRect(cx,W/2-130,H/2-150,260,310,14); cx.fill();
  cx.strokeStyle='#CC2222'; cx.lineWidth=3;
  roundRect(cx,W/2-130,H/2-150,260,310,14); cx.stroke();

  cx.textAlign='center';
  cx.fillStyle='#FF4444'; cx.font='bold 28px monospace';
  cx.fillText('GAME OVER',W/2,H/2-105);

  cx.fillStyle='#888'; cx.font='10px monospace'; cx.fillText('SCORE',W/2,H/2-70);
  cx.fillStyle='#FFD700'; cx.font='bold 52px monospace'; cx.fillText(score,W/2,H/2-28);

  cx.fillStyle='#555'; cx.font='10px monospace'; cx.fillText('BEST',W/2,H/2+10);
  cx.fillStyle='#aaa'; cx.font='bold 26px monospace'; cx.fillText(hi,W/2,H/2+38);

  cx.fillStyle='#666'; cx.font='10px monospace';
  cx.fillText('FLOORS: '+(tower.length-1),W/2,H/2+65);

  const p=0.97+0.03*Math.sin(Date.now()/280);
  cx.save(); cx.translate(W/2,H/2+120); cx.scale(p,p);
  cx.fillStyle='#E8941A';
  roundRect(cx,-85,-24,170,48,10); cx.fill();
  cx.strokeStyle='#FFD700'; cx.lineWidth=2;
  roundRect(cx,-85,-24,170,48,10); cx.stroke();
  cx.fillStyle='#000'; cx.font='bold 17px monospace';
  cx.fillText('▶  PLAY AGAIN',0,7);
  cx.restore();
  cx.textAlign='left';
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
function update(){
  if(state !== 'playing') return;
  frame++;

  // pendulum moves left-right
  pendX += pendDir * pendSpeed;
  if(pendX > W - 20){ pendX = W-20; pendDir = -1; }
  if(pendX < 20    ){ pendX = 20;   pendDir =  1; }

  // particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.96; p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  if(shakeT>0) shakeT--;
}

function render(){
  cx.clearRect(0,0,W,H);

  let sx=0,sy=0;
  if(shakeT>0){
    sx=(Math.random()-0.5)*shakeT*0.4;
    sy=(Math.random()-0.5)*shakeT*0.25;
  }
  cx.save(); cx.translate(sx,sy);

  if(state==='menu'){ drawMenu(); cx.restore(); return; }

  drawSky();
  drawCityBg();
  drawGround();

  // draw tower (skip foundation at index 0 if you want, but draw all)
  for(let i=0;i<tower.length;i++){
    drawBuilding(tower[i], i===tower.length-1);
  }

  if(state==='playing') drawCrane();

  drawParticles();

  if(state==='playing') drawHUD();
  if(state==='gameover'){ drawHUD(); drawGameOver(); }

  cx.restore();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
function handleTap(ex, ey){
  initAC();
  const r=C.getBoundingClientRect();
  const x=(ex-r.left)*(W/r.width);
  const y=(ey-r.top)*(H/r.height);

  if(state==='menu'){
    // play button hit area
    if(x>W/2-90 && x<W/2+90 && y>H*0.62-26 && y<H*0.62+26){
      startGame();
    }
    return;
  }
  if(state==='playing'){ dropBuilding(); return; }
  if(state==='gameover'){
    if(x>W/2-85 && x<W/2+85 && y>H/2+96 && y<H/2+144){
      startGame();
    }
  }
}

C.addEventListener('click', e=>handleTap(e.clientX,e.clientY));
C.addEventListener('touchstart', e=>{ e.preventDefault(); handleTap(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
document.addEventListener('keydown', e=>{
  if(['Space','Enter','ArrowDown'].includes(e.code)){
    e.preventDefault(); initAC();
    if(state==='menu'){ startGame(); return; }
    if(state==='playing'){ dropBuilding(); return; }
    if(state==='gameover'){ startGame(); }
  }
});

loop();
</script>
</body>
</html>
